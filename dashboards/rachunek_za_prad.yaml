# =============================================================================
#  Dashboard "Rachunek za prąd" — osobny widok do paska bocznego.
#
#  JAK DODAĆ (pojawi się jako ikona w lewym pasku, jak "Energia"):
#  1. Ustawienia → Dashboardy → Dodaj dashboard → "Nowy dashboard od zera".
#     Nazwa "Rachunek za prąd", ikona mdi:cash-multiple, zaznacz
#     "Pokaż w pasku bocznym".
#  2. Otwórz nowy dashboard → ⋮ → Edytuj → ⋮ → "Edytor surowej konfiguracji"
#     (Raw editor) → wklej całą zawartość tego pliku.
#
#  WYMAGANIA: karta ApexCharts (HACS → Frontend → "apexcharts-card").
#
#  ENTITY_ID zakładają nazwę instancji "Rachunek za prąd". Jeśli nazwałeś
#  inaczej, podmień prefiks sensor./number./date./select.rachunek_za_prad_
#  (Narzędzia deweloperskie → Stany pokażą realne nazwy). Licznik energii w
#  wykresach to sensor.pge_total_energy_consumption — też podmień na swój.
# =============================================================================

title: Rachunek za prąd
views:
  - title: Rachunek
    path: rachunek
    icon: mdi:cash-multiple
    type: sections
    max_columns: 2
    sections:

      # ---------------------------------------------------------------- ILE PŁACĘ
      - type: grid
        cards:
          - type: heading
            heading: Ile płacę
            heading_style: title
          - type: tile
            entity: sensor.rachunek_za_prad_do_zaplaty_brutto
            name: Do zapłaty (brutto)
            icon: mdi:cash
            color: red
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.rachunek_za_prad_naleznosc_netto
                name: Netto
                icon: mdi:receipt-text-outline
              - type: tile
                entity: sensor.rachunek_za_prad_vat
                name: VAT
                icon: mdi:percent-outline
              - type: tile
                entity: sensor.rachunek_za_prad_zuzycie_w_rachunku
                name: Zużycie
                icon: mdi:flash
              - type: tile
                entity: sensor.rachunek_za_prad_koszt_1_kwh_brutto
                name: Koszt 1 kWh
                icon: mdi:tag-outline

      # ------------------------------------------------------------- ZA CO PŁACĘ
      - type: grid
        cards:
          - type: heading
            heading: Za co płacę
            heading_style: title
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.rachunek_za_prad_sprzedaz_energii_netto
                name: Sprzedaż energii
                icon: mdi:transmission-tower-export
                color: blue
              - type: tile
                entity: sensor.rachunek_za_prad_dystrybucja_netto
                name: Dystrybucja
                icon: mdi:transmission-tower
                color: purple
              - type: tile
                entity: sensor.rachunek_za_prad_koszt_energii_zmienny_brutto
                name: Koszt zmienny (od zużycia)
                icon: mdi:chart-line-variant
              - type: tile
                entity: sensor.rachunek_za_prad_oplaty_stale_brutto
                name: Opłaty stałe (miesięczne)
                icon: mdi:calendar-clock
          - type: custom:apexcharts-card
            chart_type: donut
            header:
              show: true
              title: Z czego składa się rachunek (netto)
            series:
              - entity: sensor.rachunek_za_prad_sprzedaz_energii_netto
                name: Sprzedaż
              - entity: sensor.rachunek_za_prad_dystrybucja_netto
                name: Dystrybucja
              - entity: sensor.rachunek_za_prad_podatki_i_oplaty_netto
                name: Podatki

      # ------------------------------------------------ TABELA JAK NA FAKTURZE
      - type: grid
        cards:
          - type: heading
            heading: Rozbicie pozycji (jak na fakturze)
            heading_style: title
          - type: markdown
            content: |
              {% set s = 'sensor.rachunek_za_prad_do_zaplaty_brutto' %}
              {% set lines = state_attr(s, 'lines') or [] %}
              {% set jm = {'per_kwh':'kWh','per_mwh':'MWh','per_month':'mc','per_day':'dni','flat':'szt'} %}
              {% set d1 = states('date.rachunek_za_prad_okres_od') %}
              {% set d2 = states('date.rachunek_za_prad_okres_do') %}
              {% if d1 not in ['unknown','unavailable'] and d2 not in ['unknown','unavailable'] %}
              ### Okres: {{ d1 }} → {{ d2 }}
              {% endif %}
              | Pozycja | Ilość | J.m. | Cena netto | Netto | VAT | Brutto |
              |:--|--:|:--:|--:|--:|--:|--:|
              {% for l in lines -%}
              | {{ l.name }} | {{ '%.3f'|format(l.quantity)|replace('.',',') }} | {{ jm.get(l.unit, l.unit) }} | {{ '%.5f'|format(l.rate)|replace('.',',') }} | {{ '%.2f'|format(l.net)|replace('.',',') }} | {{ (l.vat_rate*100)|round|int }}% | {{ '%.2f'|format(l.gross)|replace('.',',') }} |
              {% endfor -%}
              | **OGÓŁEM** | | | | **{{ '%.2f'|format(state_attr(s,'net') or 0)|replace('.',',') }}** | **{{ '%.2f'|format(state_attr(s,'vat') or 0)|replace('.',',') }}** | **{{ '%.2f'|format(states(s)|float(0))|replace('.',',') }}** |

      # ------------------------------------------------------- JAK ROŚNIE W CZASIE
      - type: grid
        cards:
          - type: heading
            heading: Jak rosną koszty w czasie
            heading_style: title

          - type: custom:apexcharts-card
            graph_span: 30d
            header:
              show: true
              title: Koszt energii — dziennie (30 dni)
              show_states: false
            apex_config:
              chart:
                height: 240
            series:
              - entity: sensor.pge_total_energy_consumption
                name: Koszt dzienny
                type: column
                unit: zł
                statistics:
                  type: change
                  period: day
                group_by:
                  func: max
                  duration: 1d
                transform: >-
                  const r = Number(hass.states['sensor.rachunek_za_prad_stawka_zmienna_brutto']?.state);
                  return x * (isFinite(r) && r > 0 ? r : 1.10);

          - type: custom:apexcharts-card
            graph_span: 12w
            header:
              show: true
              title: Koszt energii — tygodniowo (12 tygodni)
            apex_config:
              chart:
                height: 240
            series:
              - entity: sensor.pge_total_energy_consumption
                name: Koszt tygodniowy
                type: column
                unit: zł
                statistics:
                  type: change
                  period: week
                transform: >-
                  const r = Number(hass.states['sensor.rachunek_za_prad_stawka_zmienna_brutto']?.state);
                  return x * (isFinite(r) && r > 0 ? r : 1.10);

          - type: custom:apexcharts-card
            graph_span: 12month
            header:
              show: true
              title: Koszt energii — miesięcznie (12 miesięcy)
            apex_config:
              chart:
                height: 240
            series:
              - entity: sensor.pge_total_energy_consumption
                name: Koszt miesięczny
                type: column
                unit: zł
                statistics:
                  type: change
                  period: month
                transform: >-
                  const r = Number(hass.states['sensor.rachunek_za_prad_stawka_zmienna_brutto']?.state);
                  return x * (isFinite(r) && r > 0 ? r : 1.10);

          - type: custom:apexcharts-card
            graph_span: 30d
            header:
              show: true
              title: Zużycie energii — dziennie (30 dni)
            apex_config:
              chart:
                height: 240
            series:
              - entity: sensor.pge_total_energy_consumption
                name: Zużycie dzienne
                type: column
                unit: kWh
                statistics:
                  type: change
                  period: day
                group_by:
                  func: max
                  duration: 1d

      # --------------------------------------------------------------- STEROWANIE
      - type: grid
        cards:
          - type: heading
            heading: Zakres, tryb, punkt zero i stawki
            heading_style: title

          - type: markdown
            content: >
              **Zakres dat i tryb.** Wybierz, jak liczyć zużycie w okresie:
              *Auto z historii* (podajesz zakres dat, integracja sama pobiera
              zużycie z historii licznika), *Ręczne odczyty* (wpisujesz odczyt
              początkowy i końcowy) lub *Punkt zero* (bieżący odczyt − zero).

          - type: entities
            title: Zakres i tryb okresu
            entities:
              - entity: select.rachunek_za_prad_tryb_zuzycia_okresu
                name: Tryb zużycia
              - entity: date.rachunek_za_prad_okres_od
                name: Okres od
              - entity: date.rachunek_za_prad_okres_do
                name: Okres do
              - entity: number.rachunek_za_prad_odczyt_poczatkowy_calodobowa
                name: Odczyt początkowy (tryb ręczny)
              - entity: number.rachunek_za_prad_odczyt_koncowy_calodobowa
                name: Odczyt końcowy (tryb ręczny)

          - type: entities
            title: Punkt zero
            entities:
              - entity: button.rachunek_za_prad_ustaw_jako_zero_calodobowa
                name: Ustaw bieżący odczyt jako zero
              - entity: number.rachunek_za_prad_odczyt_zero_calodobowa
                name: Odczyt zero (ręcznie)

          - type: markdown
            content: >
              **Stawki** — zmień, gdy URE/sprzedawca podniesie ceny (encje
              „Stawka: …"). Wartości netto, rachunek przeliczy się od razu.
